version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: portal_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-portal_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portal_password}
      POSTGRES_DB: ${DB_NAME:-portal_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-portal_user} -d ${DB_NAME:-portal_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portal_app
    env_file:
      - .env
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${DB_USER:-portal_user}:${DB_PASSWORD:-portal_password}@postgres:5432/${DB_NAME:-portal_db}
      - POSTGRES_URL=postgresql://${DB_USER:-portal_user}:${DB_PASSWORD:-portal_password}@postgres:5432/${DB_NAME:-portal_db}
      - PORT=5000
      - HOST=0.0.0.0
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount the uploads folder so generated PDFs persist across container restarts
      - portal_uploads:/app/uploads
    restart: unless-stopped

volumes:
  postgres_data:
  portal_uploads:
